name: Windows CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# A new push to the same ref cancels an in-progress run, so rapid
# successive commits don't pile up redundant Windows builds.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    name: Windows build
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: compnerd/gha-setup-swift@main
        with:
          swift-version: swift-6.2-release
          swift-build: 6.2-RELEASE

      # On Windows the package only contains WhatCableCore, the Windows
      # backend/CLI, and WhatCableCoreTests (Package.swift excludes the
      # Darwin-only targets), so plain build/test need no target filters.
      - name: Build
        run: swift build

      - name: Test
        run: swift test
